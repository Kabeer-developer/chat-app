<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background decoration -->
  <div class="bg-decoration"></div>

  <!-- Login Screen -->
  <div id="login" class="screen">
    <div class="card login-card">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" fill="url(#gradient1)" />
          <path d="M24 14v20M14 24h20" stroke="white" stroke-width="3" stroke-linecap="round" />
          <defs>
            <linearGradient id="gradient1" x1="4" y1="4" x2="44" y2="44">
              <stop offset="0%" stop-color="#667eea" />
              <stop offset="100%" stop-color="#764ba2" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Welcome</h1>
      <p class="subtitle">Enter your name to join the conversation</p>
      
      <div class="input-group">
        <input 
          type="text" 
          id="username" 
          placeholder="Your name" 
          maxlength="20"
        />
        <label for="username">Username</label>
      </div>
      
      <button class="btn btn-primary" onclick="joinChat()">
        <span>Join Chat</span>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat" class="screen hidden">
    <div class="card chat-card">
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="header-content">
          <div class="status-indicator"></div>
          <div>
            <h2>Chat Room</h2>
            <p class="online-status" id="onlineCount">Online now</p>
          </div>
        </div>
        <button class="btn-icon" onclick="leaveChat()" title="Leave chat">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M13 3h3a2 2 0 012 2v10a2 2 0 01-2 2h-3M8 14l-5-4 5-4M3 10h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Messages Container -->
      <div id="messages" class="messages-container"></div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="Type your message..." 
            maxlength="500"
          />
          <button class="btn-send" onclick="sendMessage()" title="Send message">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M18 2L9 11M18 2l-6 16-3-7-7-3 16-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
